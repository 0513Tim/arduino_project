<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Study Room System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <p class="app-tag">Smart Study Room System</p>
        <h1>智慧自習室系統</h1>
      </div>
      
    </header>

    <main>
      <section class="card login-card">
        <h2>使用者登入</h2>
        <form id="login-form">
          <label>
            學號
            <input type="text" id="student-id" placeholder="A001" required />
          </label>
          <label>
            密碼
            <input type="password" id="password" placeholder="1234" required />
          </label>
          <button type="submit" class="primary-btn">登入</button>
        </form>
        <p id="login-message" class="feedback"></p>
        <p id="login-name" class="login-name"></p>
      </section>

      <section class="card login-card">
        <div class="section-header">
          <div>
            <h2>註冊帳號</h2>
            <p class="register-hint">先到櫃檯刷卡，再按下方按鈕自動帶入最近 UID</p>
          </div>
          <button id="load-latest-uid" class="secondary-btn">帶入最近 UID</button>
        </div>
        <form id="register-form">
          <label>
            學號
            <input type="text" id="register-student-id" placeholder="A004" required />
          </label>
          <label>
            姓名
            <input type="text" id="register-name" placeholder="王小明" required />
          </label>
          <label>
            密碼
            <input type="password" id="register-password" placeholder="1234" required />
          </label>
          <label>
            UID
            <input type="text" id="register-uid" placeholder="最近刷到的 UID" required />
          </label>
          <button type="submit" class="primary-btn">註冊</button>
        </form>
        <p id="register-message" class="feedback"></p>
      </section>

      <section class="card seat-card">
        <div class="section-header">
          <div>
            <h2>座位狀態</h2>
            <p id="selected-seat">目前選擇座位：無</p>
          </div>
          <div class="button-group">
            <button id="refresh-seats" class="secondary-btn">重新整理座位</button>
            <button id="leave-button" class="danger-btn">直接離席</button>
          </div>
        </div>
        <div id="seat-grid" class="seat-grid"></div>
      </section>

      <section class="card noise-card">
        <div class="section-header">
          <h2>最新噪音</h2>
          <button id="refresh-noise" class="secondary-btn">更新噪音</button>
        </div>
        <div class="noise-info">
          <p>座位編號：<span id="noise-seat">-</span></p>
          <p>噪音值：<span id="noise-value">-</span></p>
          <p>狀態：<span id="noise-status" class="noise-status">尚無資料</span></p>
        </div>
      </section>

      
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
